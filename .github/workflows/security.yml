name: security-and-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para escanear todos os commits
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore src/api/api.csproj && dotnet restore src/api.Tests/api.Tests.csproj
      - name: Build
        run: dotnet build src/api/api.csproj --configuration Release --no-restore
      - name: Test
        # Sem AGENDIFY_TEST_MONGO os testes de integração são ignorados (Assert.Ignore),
        # então a suíte roda sem depender de um cluster Mongo real.
        run: dotnet test src/api.Tests/api.Tests.csproj --configuration Release
