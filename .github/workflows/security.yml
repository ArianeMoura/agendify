name: security-and-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para escanear todos os commits
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore src/api/api.csproj && dotnet restore src/api.Tests/api.Tests.csproj
      - name: Build
        run: dotnet build src/api/api.csproj --configuration Release --no-restore
      # A suíte usa Testcontainers para subir um PostgreSQL efêmero (o runner
      # ubuntu-latest já tem Docker). Não depende de banco externo.
      - name: Gate de concorrência (RN-01 — double-booking)
        # Bloqueio de release: N=100 criações simultâneas do mesmo slot → exatamente
        # uma persiste. Se este teste falhar, o build falha e o merge é barrado.
        run: dotnet test src/api.Tests/api.Tests.csproj --configuration Release --filter "Name~Concurrent"
      # Roda a suíte inteira e, de quebra, aplica o gate de cobertura (RNF-008 — mínimo de
      # 60% de linhas). Os dois no mesmo passo de propósito: cada `dotnet test` sobe um
      # PostgreSQL novo via Testcontainers, e separar dobraria o tempo do build à toa.
      # O gate é por LINHA: a cobertura de branch hoje está bem abaixo disso e travá-la
      # aqui barraria todo merge — está anotado no ROADMAP como trabalho à parte.
      - name: Suíte completa + gate de cobertura (RNF-008 ≥ 60% de linhas)
        run: |
          dotnet test src/api.Tests/api.Tests.csproj --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./TestResults/coverage.cobertura.xml \
            /p:Exclude="[*.Tests]*" \
            /p:Threshold=60 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total

      - name: Publicar o relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/api.Tests/TestResults/coverage.cobertura.xml
          if-no-files-found: warn
