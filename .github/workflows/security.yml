name: security-and-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para escanear todos os commits
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore src/api/api.csproj && dotnet restore src/api.Tests/api.Tests.csproj
      - name: Build
        run: dotnet build src/api/api.csproj --configuration Release --no-restore
      # A suíte usa Testcontainers para subir um PostgreSQL efêmero (o runner
      # ubuntu-latest já tem Docker). Não depende de banco externo.
      - name: Gate de concorrência (RN-01 — double-booking)
        # Bloqueio de release: N=100 criações simultâneas do mesmo slot → exatamente
        # uma persiste. Se este teste falhar, o build falha e o merge é barrado.
        run: dotnet test src/api.Tests/api.Tests.csproj --configuration Release --filter "Name~Concurrent"
      - name: Suíte completa
        run: dotnet test src/api.Tests/api.Tests.csproj --configuration Release
