name: admin-web

on:
  push:
    branches: [main]
    paths: ['src/admin/**', '.github/workflows/admin.yml']
  pull_request:
    branches: [main]
    paths: ['src/admin/**', '.github/workflows/admin.yml']

jobs:
  build:
    name: CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/admin/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
