services:
  postgres:
    image: postgres:16
    container_name: agendify-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agendify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no arquivo docker/.env}
      POSTGRES_DB: ${POSTGRES_DB:-agendify}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # A extensão btree_gist e o schema são criados pela migração da API
      # (Database.Migrate no boot em Development). Aqui só garantimos que o
      # banco está pronto para aceitar conexões.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agendify} -d ${POSTGRES_DB:-agendify}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
