<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendifyApp - Escolher Espaço</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-bar">
        <div class="top-bar-content">
            <a href="#" class="back-link"> <span class="material-symbols-outlined">arrow_back_ios</span>
            </a>
            <h2>Espaços Disponíveis</h2>
            <div class="header-placeholder"></div>
        </div>
    </header>

    <main class="login-container">
        
        <div class="space-selection-container">
            <h3>O que você gostaria de fazer?</h3>
            
            <ul class="space-list">
                
                <li class="space-item-complex">
                    <span class="space-name">Sala de Reunião A</span>
                    <div class="space-button-group">
                        <a href="agendamento.html" class="space-button agenda">Agendar</a>
                        <a href="avaliar.html?id=sala_a&nome=Sala+de+Reunião+A" class="space-button avalia">Avaliar</a>
                    </div>
                </li>

                <li class="space-item-complex">
                    <span class="space-name">Cabine Foco B</span>
                    <div class="space-button-group">
                        <a href="agendamento.html" class="space-button agenda">Agendar</a>
                        <a href="avaliar.html?id=cabine_b&nome=Cabine+Foco+B" class="space-button avalia">Avaliar</a>
                    </div>
                </li>
                
                <li class="space-item-complex">
                    <span class="space-name">Auditório</span>
                    <div class="space-button-group">
                        <a href="agendamento.html" class="space-button agenda">Agendar</a>
                        <a href="avaliar.html?id=auditorio&nome=Auditório" class="space-button avalia">Avaliar</a>
                    </div>
                </li>
                
                <li class="space-item-complex">
                    <span class="space-name">Espaço Café</span>
                    <div class="space-button-group">
                        <a href="agendamento.html" class="space-button agenda">Agendar</a>
                        <a href="avaliar.html?id=espaco_cafe&nome=Espaço+Café" class="space-button avalia">Avaliar</a>
                    </div>
                </li>
            </ul>
        </div>
    </main>
</body>
</html>
